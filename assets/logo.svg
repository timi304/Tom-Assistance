<svg width="300" height="300" viewBox="0 0 300 300"
xmlns="http://www.w3.org/2000/svg">

<defs>

    <linearGradient id="gradient"
        x1="0"
        y1="0"
        x2="1"
        y2="1">

        <stop offset="0%"
            stop-color="#2563eb"/>

        <stop offset="100%"
            stop-color="#38bdf8"/>

    </linearGradient>

</defs>


<!-- Cercle principal -->

<circle
    cx="150"
    cy="150"
    r="130"
    fill="url(#gradient)"
/>



<!-- Symbole assistance -->

<path
    d="M150 70
       C105 70 75 105 75 150
       C75 195 105 230 150 230"
    fill="none"
    stroke="white"
    stroke-width="18"
    stroke-linecap="round"
/>



<path
    d="M150 70
       C195 70 225 105 225 150
       C225 195 195 230 150 230"
    fill="none"
    stroke="white"
    stroke-width="18"
    stroke-linecap="round"
/>



<!-- Croix assistance -->

<rect
    x="130"
    y="105"
    width="40"
    height="90"
    rx="10"
    fill="white"
/>


<rect
    x="105"
    y="130"
    width="90"
    height="40"
    rx="10"
    fill="white"
/>



</svg>
